<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIDetect - Report</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">
            <div class="logo-icon small">AI</div>
            <span class="nav-brand">AIDetect</span>
        </div>
        <div class="nav-right">
            <a href="/dashboard" class="nav-link">Back to Dashboard</a>
            <a href="/" id="logoutBtn" class="nav-link">Logout</a>
        </div>
    </nav>

    <main class="dashboard" data-report-id="{{ report_id }}">
        <div class="container">
            <div id="fullReport" class="report-container hidden">
                <div class="report-header">
                    <h1>Full Report</h1>
                    <p id="reportTitle" class="report-title"></p>
                    <p id="reportDate" class="report-date"></p>
                </div>

                <div class="scores-row">
                    <div class="score-card ai-score">
                        <h3>AI Content</h3>
                        <div class="score-ring">
                            <svg viewBox="0 0 36 36">
                                <path class="ring-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                                <path id="repAiRing" class="ring-fill ai" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                                <text x="18" y="20.5" class="score-text" id="repAiText">0%</text>
                            </svg>
                        </div>
                    </div>
                    <div class="score-card human-score">
                        <h3>Human</h3>
                        <div class="score-ring">
                            <svg viewBox="0 0 36 36">
                                <path class="ring-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                                <path id="repHumanRing" class="ring-fill human" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                                <text x="18" y="20.5" class="score-text" id="repHumanText">0%</text>
                            </svg>
                        </div>
                    </div>
                    <div class="score-card plag-score">
                        <h3>Plagiarism</h3>
                        <div class="score-ring">
                            <svg viewBox="0 0 36 36">
                                <path class="ring-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                                <path id="repPlagRing" class="ring-fill plag" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                                <text x="18" y="20.5" class="score-text" id="repPlagText">0%</text>
                            </svg>
                        </div>
                    </div>
                </div>

                <div class="report-section model-breakdown">
                    <h2>AI Detection Models</h2>
                    <div id="repModelList"></div>
                </div>

                <div class="report-section">
                    <h2>Text Preview</h2>
                    <div id="repTextPreview" class="text-preview"></div>
                </div>

                <div class="report-section sources-section">
                    <h2>Matched Sources</h2>
                    <div id="repSourcesList"></div>
                </div>
            </div>
            <div id="reportLoading" class="loading">Loading report...</div>
        </div>
    </main>
    <script src="/static/js/report.js"></script>
</body>
</html>
