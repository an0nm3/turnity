<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIDetect - Login</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo">
                <div class="logo-icon">AI</div>
                <h1>AIDetect</h1>
                <p class="subtitle">AI & Plagiarism Checker</p>
            </div>
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <div id="errorMsg" class="error-msg hidden"></div>
                <button type="submit" class="btn-primary">Sign In</button>
            </form>
            <p class="auth-link">Don't have an account? <a href="/signup">Sign up</a></p>
            <div class="auth-info">
                <p>Free • No credit card • 50 checks/day</p>
            </div>
        </div>
    </div>
    <script src="/static/js/auth.js"></script>
</body>
</html>
